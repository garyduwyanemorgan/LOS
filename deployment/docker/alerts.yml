groups:
  - name: los_alerts
    rules:
      - alert: BackendDown
        expr: up{job="los-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "LOS backend is down"
          description: "The LOS API backend has been unreachable for more than 2 minutes."

      - alert: HighResponseTime
        expr: http_request_duration_seconds{quantile="0.95"} > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API response time"
          description: "95th percentile response time exceeds 5 seconds."

      - alert: DatabaseConnectionFailure
        expr: los_database_connected == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection failure"
          description: "LOS cannot connect to PostgreSQL."

      - alert: RedisConnectionFailure
        expr: los_redis_connected == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis connection failure"
          description: "LOS cannot connect to Redis (event bus unavailable)."

      - alert: CeleryWorkerDown
        expr: celery_workers_total == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No Celery workers available"
          description: "All Celery workers are offline. Background processing is suspended."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate"
          description: "More than 5% of requests are returning 5xx errors."
