# Alembic configuration for the Lagoons Operating System.
#
# To generate a new migration:
#   alembic revision --autogenerate -m "describe change"
#
# To apply migrations:
#   alembic upgrade head
#
# To roll back:
#   alembic downgrade -1

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+psycopg2://%(DATABASE_USER)s:%(DATABASE_PASSWORD)s@%(DATABASE_HOST)s:%(DATABASE_PORT)s/%(DATABASE_NAME)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
