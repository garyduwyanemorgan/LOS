name: LOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# Shared env vars for all backend test jobs
# (secrets can't be in top-level env, so we repeat where needed)

jobs:
  # ── Backend: Lint + Type Check ─────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

      - name: MyPy type check
        run: mypy backend/ --ignore-missing-imports

  # ── Backend: Unit Tests ────────────────────────────────────────────────────
  backend-test:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: los_test
          POSTGRES_PASSWORD: los_test_password
          POSTGRES_DB: los_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://los_test:los_test_password@localhost:5432/los_test
          DATABASE_SYNC_URL: postgresql://los_test:los_test_password@localhost:5432/los_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          JWT_SECRET_KEY: test-jwt-key-minimum-32-characters-long
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          SUPABASE_JWT_SECRET: test-jwt-secret-minimum-32-chars
          NEO4J_PASSWORD: test_password
          ANTHROPIC_API_KEY: sk-ant-test-key-for-ci-only
          CELERY_TASK_ALWAYS_EAGER: "true"
          ENVIRONMENT: development
        run: |
          pytest tests/unit/ -v --tb=short --cov=backend --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Backend: Scientific Validation Tests ──────────────────────────────────
  scientific-validation:
    name: Backend — Scientific Model Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run scientific validation tests
        env:
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          JWT_SECRET_KEY: test-jwt-key-minimum-32-characters-long
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          SUPABASE_JWT_SECRET: test-jwt-secret-minimum-32-chars
          NEO4J_PASSWORD: test
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          ANTHROPIC_API_KEY: sk-ant-test-key-for-ci-only
          ENVIRONMENT: development
        run: pytest tests/scientific_validation/ -v --tb=short

  # ── Backend: End-to-End Pipeline Tests ────────────────────────────────────
  e2e-tests:
    name: Backend — End-to-End Pipeline Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run end-to-end pipeline tests
        env:
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          JWT_SECRET_KEY: test-jwt-key-minimum-32-characters-long
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          SUPABASE_JWT_SECRET: test-jwt-secret-minimum-32-chars
          NEO4J_PASSWORD: test
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          ANTHROPIC_API_KEY: sk-ant-test-key-for-ci-only
          ENVIRONMENT: development
        run: pytest tests/e2e/ -v --tb=short

  # ── Backend: Performance Tests ─────────────────────────────────────────────
  performance-tests:
    name: Backend — Performance / Latency Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run performance tests
        env:
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          JWT_SECRET_KEY: test-jwt-key-minimum-32-characters-long
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          SUPABASE_JWT_SECRET: test-jwt-secret-minimum-32-chars
          NEO4J_PASSWORD: test
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          ANTHROPIC_API_KEY: sk-ant-test-key-for-ci-only
          ENVIRONMENT: development
        run: pytest tests/performance/ -v --tb=short

  # ── Backend: API Tests ─────────────────────────────────────────────────────
  api-tests:
    name: Backend — API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run API tests
        env:
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          JWT_SECRET_KEY: test-jwt-key-minimum-32-characters-long
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          SUPABASE_JWT_SECRET: test-jwt-secret-minimum-32-chars
          NEO4J_PASSWORD: test
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          ANTHROPIC_API_KEY: sk-ant-test-key-for-ci-only
          ENVIRONMENT: development
        run: pytest tests/api/ -v --tb=short

  # ── Frontend: Build + Type Check ──────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Build production bundle
        run: npm run build

  # ── Frontend: Unit Tests ──────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Vitest unit tests
        run: npm run test

  # ── Docker: Build Images ──────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-test
      - frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
